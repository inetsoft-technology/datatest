name: MV Module Tests

on:
  workflow_dispatch:
  # Scheduled execution: 9:00 AM China time (1:00 AM UTC)
  # schedule:
  #   - cron: '0 1 * * *'

jobs:
  build-stylebi:
    uses: ./.github/workflows/build-stylebi.yml

  test:
    runs-on: ubuntu-latest
    needs: build-stylebi
    timeout-minutes: 60

    steps:
      - name: Configure /etc/hosts
        run: |
          echo "35.209.161.246 mysql_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 db2_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 derby_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 oracle_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 informix_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 postgres_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 sqlserver_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 clickhouse_server" | sudo tee -a /etc/hosts

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings for private repository
        uses: s4u/maven-settings-action@v3.0.0
        with:
          repositories: |
            [
              {
                "id": "gh-stylebi",
                "url": "https://maven.pkg.github.com/inetsoft-technology/stylebi",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]
          servers: |
            [
              {
                "id": "gh-stylebi",
                "username": "${{ secrets.MAVEN_USERNAME }}",
                "password": "${{ secrets.MAVEN_PASSWORD }}"
              }
            ]

      - name: Restore stylebi-enterprise Maven artifacts from cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/inetsoft
          key: stylebi-enterprise-${{ needs.build-stylebi.outputs.stylebi-sha }}-community-${{ needs.build-stylebi.outputs.community-sha }}

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Initialize environment
        run: |
          ./mvnw clean
          ./mvnw package -pl commons -DskipTests

      - name: Run incrementalmv tests
        run: |
          ./mvnw test -pl mv -Pincrementalmv -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Run topmv tests
        run: |
          ./mvnw test -pl mv -Ptopmv -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Run submv tests
        run: |
          ./mvnw test -pl mv -Psubmv -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Run vpm tests
        run: |
          ./mvnw test -pl mv -Pvpm -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Run others tests
        run: |
          ./mvnw test -pl mv -Pothers -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: MV Maven Tests
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Upload Spock reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mv-spock-reports
          path: 'mv/target/spock-reports/'
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload exportData directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mv-exportData
          path: 'mv/target/test-classes/exportData/'
          retention-days: 7
          if-no-files-found: ignore