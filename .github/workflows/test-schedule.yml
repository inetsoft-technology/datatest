name: Scheduled Test Execution

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Test module (leave blank for all)'
        required: false
        default: ''
      profile:
        description: 'Test profile (for vsothers and mv module)'
        required: false
        default: ''
  # Scheduled execution: 9:00 AM China time (1:00 AM UTC)
  # schedule:
  #   - cron: '0 1 * * *'

jobs:
  build-stylebi:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      stylebi-sha: ${{ steps.stylebi-sha.outputs.sha }}
      community-sha: ${{ steps.community-sha.outputs.sha }}

    steps:
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven settings for private repository
        uses: s4u/maven-settings-action@v3.0.0
        with:
          repositories: |
            [
              {
                "id": "gh-stylebi",
                "url": "https://maven.pkg.github.com/inetsoft-technology/stylebi",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]
          servers: |
            [
              {
                "id": "gh-stylebi",
                "username": "${{ secrets.MAVEN_USERNAME }}",
                "password": "${{ secrets.MAVEN_PASSWORD }}"
              }
            ]

      - name: Get stylebi-enterprise HEAD commit SHA
        id: stylebi-sha
        run: |
          SHA=$(curl -s -H "Authorization: token ${{ secrets.MAVEN_PASSWORD }}" \
            "https://api.github.com/repos/inetsoft-technology/stylebi-enterprise/commits/epic-70095" \
            | jq -r '.sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Get stylebi (community) HEAD commit SHA
        id: community-sha
        run: |
          SHA=$(curl -s -H "Authorization: token ${{ secrets.MAVEN_PASSWORD }}" \
            "https://api.github.com/repos/inetsoft-technology/stylebi/commits/epic-70095" \
            | jq -r '.sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Cache stylebi-enterprise Maven artifacts
        id: stylebi-cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/com/inetsoft
          key: stylebi-enterprise-${{ steps.stylebi-sha.outputs.sha }}-community-${{ steps.community-sha.outputs.sha }}

      - name: Checkout stylebi-enterprise with submodules
        if: steps.stylebi-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: inetsoft-technology/stylebi-enterprise
          token: ${{ secrets.MAVEN_PASSWORD }}
          ref: epic-70095
          submodules: recursive
          path: stylebi-enterprise

      - name: Cache Maven dependencies for stylebi build
        if: steps.stylebi-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-stylebi-deps-${{ hashFiles('stylebi-enterprise/**/pom.xml') }}
          restore-keys: |
            maven-stylebi-deps-

      - name: Build and install stylebi-enterprise to local Maven cache
        if: steps.stylebi-cache.outputs.cache-hit != 'true'
        working-directory: stylebi-enterprise
        run: |
          chmod +x mvnw
          ./mvnw install -DskipTests -T 2C -q -pl '!community/web,!server,!community/server,!docker,!community/docker,!shell'

  test:
    runs-on: ubuntu-latest
    needs: build-stylebi
    timeout-minutes: 60

    steps:
      - name: Configure /etc/hosts
        run: |
          echo "127.0.0.1 mysql_server" | sudo tee -a /etc/hosts
          echo "127.0.0.1 db2_server" | sudo tee -a /etc/hosts

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings for private repository
        uses: s4u/maven-settings-action@v3.0.0
        with:
          repositories: |
            [
              {
                "id": "gh-stylebi",
                "url": "https://maven.pkg.github.com/inetsoft-technology/stylebi",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]
          servers: |
            [
              {
                "id": "gh-stylebi",
                "username": "${{ secrets.MAVEN_USERNAME }}",
                "password": "${{ secrets.MAVEN_PASSWORD }}"
              }
            ]

      - name: Restore stylebi-enterprise Maven artifacts from cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/inetsoft
          key: stylebi-enterprise-${{ needs.build-stylebi.outputs.stylebi-sha }}-community-${{ needs.build-stylebi.outputs.community-sha }}

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Initialize environment
        run: |
          ./mvnw clean
          ./mvnw package -pl commons -DskipTests

      - name: Run tests
        run: |
          if [ -n "${{ github.event.inputs.module }}" ]; then
            if [ -n "${{ github.event.inputs.profile }}" ]; then
              ./mvnw test -pl ${{ github.event.inputs.module }} -P${{ github.event.inputs.profile }} -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}" -Duse.testcontainers=true
            else
              ./mvnw test -pl ${{ github.event.inputs.module }} -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}" -Duse.testcontainers=true
            fi
          else
            ./mvnw test -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}" -Duse.testcontainers=true
          fi

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Generate diff images HTML report
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'PYEOF'
          import os, glob, base64, json, html, urllib.request, urllib.error, time

          out_path = "target/diff-images-report.html"
          os.makedirs("target", exist_ok=True)

          github_token = os.environ.get("GITHUB_TOKEN", "")

          def analyze_image(b64_img, token):
              if not token:
                  return ""
              payload = {
                  "model": "gpt-4o",
                  "messages": [{
                      "role": "user",
                      "content": [
                          {"type": "text", "text": (
                              "This is a UI automated test diff image showing a comparison between expected and actual results. "
                              "Please analyze the visual differences and describe: "
                              "1) What specific UI elements differ, "
                              "2) The likely cause of the test failure. "
                              "Be concise and specific."
                          )},
                          {"type": "image_url", "image_url": {"url": f"data:image/png;base64,{b64_img}"}}
                      ]
                  }],
                  "max_tokens": 400
              }
              req = urllib.request.Request(
                  "https://models.inference.ai.azure.com/chat/completions",
                  data=json.dumps(payload).encode("utf-8"),
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      data = json.loads(resp.read().decode("utf-8"))
                      return data["choices"][0]["message"]["content"]
              except Exception as e:
                  print(f"  AI analysis failed: {e}")
                  return ""

          diff_images = []
          for path in glob.glob("./**/target/test-classes/exportData/**/*_diff.png", recursive=True):
              rel = path.replace("./", "").replace("target/test-classes/exportData/", "")
              diff_images.append((rel, path))

          with open(out_path, "w", encoding="utf-8") as f:
              f.write("""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>Test Diff Images</title>
          <style>
            body { font-family: sans-serif; margin: 20px; }
            h1 { color: #333; }
            .case { margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
            .toggle { display:block; width:100%; padding: 10px 14px; background:#fff0f0;
                      border:none; text-align:left; cursor:pointer; color:#c00;
                      font-size:0.95em; word-break:break-all; font-family:sans-serif; }
            .toggle:hover { background:#ffe0e0; }
            .toggle::before { content: '\\25B6 '; font-size:0.8em; }
            .toggle.open::before { content: '\\25BC '; }
            .img-wrap { display:none; padding:12px; }
            .img-wrap img { max-width:100%; border:1px solid #ccc; display:block; }
            .ai-box { margin-top:12px; padding:12px; background:#f0f7ff;
                      border:1px solid #b0d4f1; border-radius:4px; }
            .ai-box h3 { margin:0 0 8px 0; color:#1a5f9e; font-size:0.9em; }
            .ai-box p { margin:0; font-size:0.9em; white-space:pre-wrap; line-height:1.6; }
            .none { color: #666; }
          </style>
          <script>
            function toggle(btn) {
              btn.classList.toggle('open');
              var wrap = btn.nextElementSibling;
              wrap.style.display = wrap.style.display === 'block' ? 'none' : 'block';
            }
          </script>
          </head><body><h1>Failed Test Diff Images</h1>
          """)

              if diff_images:
                  for i, (rel, path) in enumerate(diff_images):
                      with open(path, "rb") as img_f:
                          b64 = base64.b64encode(img_f.read()).decode("utf-8")
                      print(f"Analyzing [{i+1}/{len(diff_images)}]: {rel}")
                      ai_text = analyze_image(b64, github_token)
                      if i < len(diff_images) - 1:
                          time.sleep(1)  # avoid rate limiting
                      f.write(f"<div class='case'>")
                      f.write(f"<button class='toggle' onclick='toggle(this)'>{html.escape(rel)}</button>")
                      f.write(f"<div class='img-wrap'>")
                      f.write(f"<img src='data:image/png;base64,{b64}'/>")
                      if ai_text:
                          f.write(f"<div class='ai-box'><h3>&#129302; AI Analysis</h3>"
                                  f"<p>{html.escape(ai_text)}</p></div>")
                      f.write(f"</div></div>\n")
              else:
                  f.write("<p class='none'>No diff images found.</p>")

              f.write("</body></html>")

          print(f"Report generated: {out_path} ({len(diff_images)} diff image(s))")
          PYEOF

      - name: Upload diff images report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-images-report
          path: target/diff-images-report.html
          retention-days: 7
          if-no-files-found: ignore

      - name: Generate HTML diff report
        if: always()
        run: |
          python3 - << 'PYEOF'
          import os, glob, html, base64

          out_path = "target/html-diff-report.html"
          os.makedirs("target", exist_ok=True)

          cases = []
          for actual_path in glob.glob("./**/target/test-classes/exportData/**/*.html", recursive=True):
              expect_path = actual_path.replace("/exportData/", "/expectData/")
              if not os.path.exists(expect_path):
                  continue
              with open(expect_path, encoding="utf-8", errors="replace") as f:
                  expect_content = f.read()
              with open(actual_path, encoding="utf-8", errors="replace") as f:
                  actual_content = f.read()
              if expect_content == actual_content:
                  continue
              rel = actual_path.replace("./", "").replace("target/test-classes/exportData/", "")
              cases.append((rel, expect_content, actual_content))

          with open(out_path, "w", encoding="utf-8") as f:
              f.write("""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>HTML File Diff Report</title>
          <style>
            body { font-family: sans-serif; margin: 20px; }
            h1 { color: #333; }
            .case { margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
            .toggle { display:block; width:100%; padding: 10px 14px; background:#fff0f0;
                      border:none; text-align:left; cursor:pointer; color:#c00;
                      font-size:0.95em; word-break:break-all; font-family:sans-serif; }
            .toggle:hover { background:#ffe0e0; }
            .toggle::before { content: '\\25B6 '; font-size:0.8em; }
            .toggle.open::before { content: '\\25BC '; }
            .frame-wrap { display:none; padding:12px; }
            .frame-row { display:flex; gap:8px; overflow-x:auto; }
            .frame-col { flex:1; min-width:800px; }
            .frame-label { font-size:12px; font-weight:bold; margin-bottom:4px;
                           padding: 3px 8px; border-radius:3px; }
            .label-expect { background:#e8f4e8; color:#2a6a2a; }
            .label-actual { background:#fde8e8; color:#8b0000; }
            iframe { width:100%; height:600px; min-height:200px; border:1px solid #ccc; border-radius:3px;
                     resize:vertical; overflow:auto; display:block; }
            .none { color: #666; }
          </style>
          <script>
            function toggle(btn) {
              btn.classList.toggle('open');
              var wrap = btn.nextElementSibling;
              wrap.style.display = wrap.style.display === 'flex' ? 'none' : 'flex';
            }
          </script>
          </head><body><h1>Failed HTML File Diffs</h1>
          """)
              if cases:
                  for rel, expect_content, actual_content in cases:
                      expect_b64 = base64.b64encode(expect_content.encode("utf-8")).decode()
                      actual_b64 = base64.b64encode(actual_content.encode("utf-8")).decode()
                      f.write(
                          f"<div class='case'>"
                          f"<button class='toggle' onclick='toggle(this)'>{html.escape(rel)}</button>"
                          f"<div class='frame-wrap'>"
                          f"<div class='frame-row'>"
                          f"<div class='frame-col'>"
                          f"<div class='frame-label label-expect'>Expected</div>"
                          f"<iframe src='data:text/html;base64,{expect_b64}'></iframe>"
                          f"</div>"
                          f"<div class='frame-col'>"
                          f"<div class='frame-label label-actual'>Actual</div>"
                          f"<iframe src='data:text/html;base64,{actual_b64}'></iframe>"
                          f"</div>"
                          f"</div></div></div>\n"
                      )
              else:
                  f.write("<p class='none'>No HTML diff found.</p>")
              f.write("</body></html>")

          print(f"Found {len(cases)} HTML diff(s).")
          PYEOF

      - name: Upload HTML diff report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-diff-report
          path: target/html-diff-report.html
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Spock reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spock-reports
          path: '**/target/spock-reports/'
          retention-days: 7
          if-no-files-found: ignore
