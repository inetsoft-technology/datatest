name: Scheduled Test Execution

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Test module (leave blank for all)'
        required: false
        default: ''
      profile:
        description: 'Test profile (for vsothers and mv module)'
        required: false
        default: ''
  # Scheduled execution: 9:00 AM China time (1:00 AM UTC)
  # schedule:
  #   - cron: '0 1 * * *'

jobs:
  build-stylebi:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      stylebi-sha: ${{ steps.stylebi-sha.outputs.sha }}

    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Maven settings for private repository
        uses: s4u/maven-settings-action@v3.0.0
        with:
          repositories: |
            [
              {
                "id": "gh-stylebi",
                "url": "https://maven.pkg.github.com/inetsoft-technology/stylebi",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]
          servers: |
            [
              {
                "id": "gh-stylebi",
                "username": "${{ secrets.MAVEN_USERNAME }}",
                "password": "${{ secrets.MAVEN_PASSWORD }}"
              }
            ]

      - name: Get stylebi-enterprise HEAD commit SHA
        id: stylebi-sha
        run: |
          SHA=$(curl -s -H "Authorization: token ${{ secrets.MAVEN_PASSWORD }}" \
            "https://api.github.com/repos/inetsoft-technology/stylebi-enterprise/commits/epic-70095" \
            | jq -r '.sha')
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Cache stylebi-enterprise Maven artifacts
        id: stylebi-cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/com/inetsoft
          key: stylebi-enterprise-${{ steps.stylebi-sha.outputs.sha }}

      - name: Checkout stylebi-enterprise with submodules
        if: steps.stylebi-cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: inetsoft-technology/stylebi-enterprise
          token: ${{ secrets.MAVEN_PASSWORD }}
          ref: epic-70095
          submodules: recursive
          path: stylebi-enterprise

      - name: Cache Maven dependencies for stylebi build
        if: steps.stylebi-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-stylebi-deps-${{ hashFiles('stylebi-enterprise/**/pom.xml') }}
          restore-keys: |
            maven-stylebi-deps-

      - name: Build and install stylebi-enterprise to local Maven cache
        if: steps.stylebi-cache.outputs.cache-hit != 'true'
        working-directory: stylebi-enterprise
        run: |
          chmod +x mvnw
          ./mvnw install -DskipTests -T 2C -q -pl '!community/web,!server,!community/server,!docker,!community/docker,!shell'

  test:
    runs-on: ubuntu-latest
    needs: build-stylebi
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings for private repository
        uses: s4u/maven-settings-action@v3.0.0
        with:
          repositories: |
            [
              {
                "id": "gh-stylebi",
                "url": "https://maven.pkg.github.com/inetsoft-technology/stylebi",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]
          servers: |
            [
              {
                "id": "gh-stylebi",
                "username": "${{ secrets.MAVEN_USERNAME }}",
                "password": "${{ secrets.MAVEN_PASSWORD }}"
              }
            ]

      - name: Restore stylebi-enterprise Maven artifacts from cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/inetsoft
          key: stylebi-enterprise-${{ needs.build-stylebi.outputs.stylebi-sha }}

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Initialize environment
        run: |
          ./mvnw clean
          ./mvnw package -pl commons -DskipTests

      - name: Run tests
        run: |
          if [ -n "${{ github.event.inputs.module }}" ]; then
            if [ -n "${{ github.event.inputs.profile }}" ]; then
              ./mvnw test -pl ${{ github.event.inputs.module }} -P${{ github.event.inputs.profile }} -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"
            else
              ./mvnw test -pl ${{ github.event.inputs.module }} -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"
            fi
          else
            ./mvnw test -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"
          fi

      - name: Generate Surefire HTML report
        if: always()
        run: ./mvnw surefire-report:report-only

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests
          path: '**/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Upload Surefire HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-html-report
          path: '**/target/site/'
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Spock reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spock-reports
          path: '**/target/spock-reports/'
          retention-days: 7
          if-no-files-found: ignore
