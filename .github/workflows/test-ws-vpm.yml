name: WS and VPM Module Tests

on:
  workflow_dispatch:
  # Scheduled execution: 9:00 AM China time (1:00 AM UTC)
  # schedule:
  #   - cron: '0 1 * * *'

jobs:
  build-stylebi:
    uses: ./.github/workflows/build-stylebi.yml

  test:
    runs-on: ubuntu-latest
    needs: build-stylebi
    timeout-minutes: 60

    steps:
      - name: Configure /etc/hosts
        run: |
          echo "35.209.161.246 mysql_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 db2_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 derby_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 oracle_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 informix_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 postgres_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 sqlserver_server" | sudo tee -a /etc/hosts
          echo "35.209.161.246 clickhouse_server" | sudo tee -a /etc/hosts

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure Maven settings for private repository
        uses: s4u/maven-settings-action@v3.0.0
        with:
          repositories: |
            [
              {
                "id": "gh-stylebi",
                "url": "https://maven.pkg.github.com/inetsoft-technology/stylebi",
                "releases": { "enabled": "true" },
                "snapshots": { "enabled": "true" }
              }
            ]
          servers: |
            [
              {
                "id": "gh-stylebi",
                "username": "${{ secrets.MAVEN_USERNAME }}",
                "password": "${{ secrets.MAVEN_PASSWORD }}"
              }
            ]

      - name: Restore stylebi-enterprise Maven artifacts from cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/com/inetsoft
          key: stylebi-enterprise-${{ needs.build-stylebi.outputs.stylebi-sha }}-community-${{ needs.build-stylebi.outputs.community-sha }}

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Initialize environment
        run: |
          ./mvnw clean
          ./mvnw package -pl commons -DskipTests

      - name: Run ws tests
        run: ./mvnw test -pl ws -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Run vpm tests
        run: ./mvnw test -pl vpm -Pvpm -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Run additionalDB tests
        run: ./mvnw test -pl vpm -PadditionalDB -Dinetsoft.license.key="${{ secrets.INETSOFT_LICENSE_KEY }}"

      - name: Publish WS Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: WS Maven Tests
          path: 'ws/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Publish VPM Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: VPM Maven Tests
          path: 'vpm/target/surefire-reports/*.xml'
          reporter: java-junit

      - name: Generate WS diff images HTML report
        if: always()
        run: |
          python3 - << 'PYEOF'
          import os, glob, base64, html

          out_path = "target/ws-diff-images-report.html"
          os.makedirs("target", exist_ok=True)

          diff_images = []
          for path in glob.glob("./ws/target/test-classes/exportData/**/*_diff.png", recursive=True):
              rel = path.replace("./", "").replace("target/test-classes/exportData/", "")
              diff_images.append((rel, path))

          with open(out_path, "w", encoding="utf-8") as f:
              f.write("""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>WS Test Diff Images</title>
          <style>
            body { font-family: sans-serif; margin: 20px; }
            h1 { color: #333; }
            .case { margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
            .toggle { display:block; width:100%; padding: 10px 14px; background:#fff0f0;
                      border:none; text-align:left; cursor:pointer; color:#c00;
                      font-size:0.95em; word-break:break-all; font-family:sans-serif; }
            .toggle:hover { background:#ffe0e0; }
            .toggle::before { content: '\25B6 '; font-size:0.8em; }
            .toggle.open::before { content: '\25BC '; }
            .img-wrap { display:none; padding:12px; }
            .img-wrap img { max-width:100%; border:1px solid #ccc; display:block; }
            .none { color: #666; }
          </style>
          <script>
            function toggle(btn) {
              btn.classList.toggle('open');
              var wrap = btn.nextElementSibling;
              wrap.style.display = wrap.style.display === 'block' ? 'none' : 'block';
            }
          </script>
          </head><body><h1>WS Failed Test Diff Images</h1>
          """)
              if diff_images:
                  for i, (rel, path) in enumerate(diff_images):
                      with open(path, "rb") as img_f:
                          b64 = base64.b64encode(img_f.read()).decode("utf-8")
                      print(f"Processing WS [{i+1}/{len(diff_images)}]: {rel}")
                      f.write(f"<div class='case'>")
                      f.write(f"<button class='toggle' onclick='toggle(this)'>{html.escape(rel)}</button>")
                      f.write(f"<div class='img-wrap'>")
                      f.write(f"<img src='data:image/png;base64,{b64}'/>")
                      f.write(f"</div></div>\n")
              else:
                  f.write("<p class='none'>No WS diff images found.</p>")

              f.write("</body></html>")

          print(f"WS report generated: {out_path} ({len(diff_images)} diff image(s))")
          PYEOF

      - name: Generate VPM diff images HTML report
        if: always()
        run: |
          python3 - << 'PYEOF'
          import os, glob, base64, html

          out_path = "target/vpm-diff-images-report.html"
          os.makedirs("target", exist_ok=True)

          diff_images = []
          for path in glob.glob("./vpm/target/test-classes/exportData/**/*_diff.png", recursive=True):
              rel = path.replace("./", "").replace("target/test-classes/exportData/", "")
              diff_images.append((rel, path))

          with open(out_path, "w", encoding="utf-8") as f:
              f.write("""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"><title>VPM Test Diff Images</title>
          <style>
            body { font-family: sans-serif; margin: 20px; }
            h1 { color: #333; }
            .case { margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; }
            .toggle { display:block; width:100%; padding: 10px 14px; background:#fff0f0;
                      border:none; text-align:left; cursor:pointer; color:#c00;
                      font-size:0.95em; word-break:break-all; font-family:sans-serif; }
            .toggle:hover { background:#ffe0e0; }
            .toggle::before { content: '\25B6 '; font-size:0.8em; }
            .toggle.open::before { content: '\25BC '; }
            .img-wrap { display:none; padding:12px; }
            .img-wrap img { max-width:100%; border:1px solid #ccc; display:block; }
            .none { color: #666; }
          </style>
          <script>
            function toggle(btn) {
              btn.classList.toggle('open');
              var wrap = btn.nextElementSibling;
              wrap.style.display = wrap.style.display === 'block' ? 'none' : 'block';
            }
          </script>
          </head><body><h1>VPM Failed Test Diff Images</h1>
          """)
              if diff_images:
                  for i, (rel, path) in enumerate(diff_images):
                      with open(path, "rb") as img_f:
                          b64 = base64.b64encode(img_f.read()).decode("utf-8")
                      print(f"Processing VPM [{i+1}/{len(diff_images)}]: {rel}")
                      f.write(f"<div class='case'>")
                      f.write(f"<button class='toggle' onclick='toggle(this)'>{html.escape(rel)}</button>")
                      f.write(f"<div class='img-wrap'>")
                      f.write(f"<img src='data:image/png;base64,{b64}'/>")
                      f.write(f"</div></div>\n")
              else:
                  f.write("<p class='none'>No VPM diff images found.</p>")

              f.write("</body></html>")

          print(f"VPM report generated: {out_path} ({len(diff_images)} diff image(s))")
          PYEOF

      - name: Upload WS diff images report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ws-diff-images-report
          path: target/ws-diff-images-report.html
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload VPM diff images report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vpm-diff-images-report
          path: target/vpm-diff-images-report.html
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload WS Spock reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ws-spock-reports
          path: 'ws/target/spock-reports/'
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload VPM Spock reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vpm-spock-reports
          path: 'vpm/target/spock-reports/'
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload WS exportData directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ws-exportData
          path: 'ws/target/test-classes/exportData/'
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload VPM exportData directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vpm-exportData
          path: 'vpm/target/test-classes/exportData/'
          retention-days: 7
          if-no-files-found: ignore
