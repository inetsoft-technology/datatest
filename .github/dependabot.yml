version: 2

updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: monthly
      time: "04:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    groups:
      spring-framework:
        patterns:
          - "org.springframework*"
      spock-groovy:
        patterns:
          - "org.spockframework*"
          - "org.apache.groovy*"
      jackson:
        patterns:
          - "com.fasterxml.jackson*"
      testing:
        patterns:
          - "org.mockito*"
          - "com.github.romankh3*"
    ignore:
      - dependency-name: "com.inetsoft*"
      - dependency-name: "jdbc-*"
    labels:
      - "dependencies"
      - "automated"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - "github-actions"
      - "automated"
